name: tbs_wing_aio
manufacturer: TEBS
mcu: stm32h743
vehicles:
  - wing
  - rover
leds:
  - pin: PE3
    invert: false
  - pin: PE4
    invert: false
serial_ports:
  - index: 1
    rx: PA10
    tx: PA9
  - index: 2
    rx: PD6
    tx: PD5
  - index: 3
    rx: PD9
    tx: PD8
  - index: 4
    rx: PB8
    tx: PB9
  - index: 6
    rx: PC7
    tx: PC6
  - index: 7
    rx: PE7
    tx: PE8
  - index: 8
    rx: PE0
    tx: PE1
spi_ports:
  - index: 1
    miso: PA6
    mosi: PD7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB13
  - index: 3
    miso: PB4
    mosi: PB5
    sck: PB3
  - index: 4
    miso: PE13
    mosi: PE14
    sck: PE12
gyro:
  port: 1
  nss: PC15
gyro_orientation: 8
osd:
  port: 2
  nss: PB12
vbat: PC0
vbat_scale: 210
ibat: PC1
ibat_scale: 200
rgb_led: PA15
buzzer:
  pin: PC2
  invert: true
motor_pins:
  - PB0
  - PB1
  - PA0
  - PA1
  - PA2
  - PA3
  - PD12
outputs:
  - pin: PB0
    caps:
      - dshot
      - pwm
  - pin: PB1
    caps:
      - dshot
      - pwm
  - pin: PA0
    caps:
      - dshot
      - pwm
  - pin: PA1
    caps:
      - dshot
      - pwm
  - pin: PA2
    caps:
      - dshot
      - pwm
  - pin: PA3
    caps:
      - dshot
      - pwm
  - pin: PD12
    caps:
      - dshot
      - pwm
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 11
    tag: TIMER1_CH1
  DSHOT_CH2:
    dma: DMA1_STREAM2
    request: 12
    tag: TIMER1_CH2
  DSHOT_CH3:
    dma: DMA1_STREAM3
    request: 13
    tag: TIMER1_CH3
  RGB:
    dma: DMA1_STREAM4
    request: 18
    tag: TIMER2_CH1
  SPI1_RX:
    dma: DMA1_STREAM5
    request: 37
    tag: SPI1_MISO
  SPI1_TX:
    dma: DMA1_STREAM6
    request: 38
    tag: SPI1_MOSI
  SPI2_RX:
    dma: DMA1_STREAM7
    request: 39
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM8
    request: 40
    tag: SPI2_MOSI
  SPI3_RX:
    dma: DMA2_STREAM1
    request: 61
    tag: SPI3_MISO
  SPI3_TX:
    dma: DMA2_STREAM2
    request: 62
    tag: SPI3_MOSI
  SPI4_RX:
    dma: DMA2_STREAM3
    request: 83
    tag: SPI4_MISO
  SPI4_TX:
    dma: DMA2_STREAM4
    request: 84
    tag: SPI4_MOSI
