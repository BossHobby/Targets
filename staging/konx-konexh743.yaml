name: konexh743
manufacturer: KONX
mcu: stm32h743
brushless: true
leds:
  - invert: true
    pin: PC13
  - invert: true
    pin: PC10
serial_ports:
  - index: 3
    rx: PD9
    tx: PD8
  - index: 4
    rx: PA1
    tx: PA0
  - index: 5
    rx: PD2
  - index: 6
    rx: PC7
    tx: PC6
  - index: 7
    rx: PA8
  - index: 8
    rx: PE0
    tx: PE1
spi_ports:
  - index: 1
    miso: PA6
    mosi: PA7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB13
  - index: 4
    miso: PE5
    mosi: PE6
    sck: PE2
i2c_ports:
  - index: 2
    scl: PB10
    sda: PB11
  - index: 4
    scl: PD12
    sda: PD13
gyro:
  port: 1
  nss: PB1
  exti: PB0
gyro_orientation: 4
flash:
  port: 4
  nss: PE4
vbat: PC0
vbat_scale: 156
ibat: PC5
rgb_led: PC9
buzzer:
  invert: true
  pin: PE10
motor_pins:
  - PB8
  - PB9
  - PB6
  - PB7
baro:
  port: 2
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 11
    tag: TIMER1_CH1
  RGB:
    dma: DMA1_STREAM2
    request: 26
    tag: TIMER3_CH4
  SPI1_RX:
    dma: DMA1_STREAM3
    request: 37
    tag: SPI1_MISO
  SPI1_TX:
    dma: DMA1_STREAM4
    request: 38
    tag: SPI1_MOSI
  SPI2_RX:
    dma: DMA1_STREAM5
    request: 39
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM6
    request: 40
    tag: SPI2_MOSI
  SPI4_RX:
    dma: DMA1_STREAM7
    request: 83
    tag: SPI4_MISO
  SPI4_TX:
    dma: DMA1_STREAM8
    request: 84
    tag: SPI4_MOSI
vehicles:
  - multi
outputs:
  - pin: PB8
    caps:
      - motor
      - servo
  - pin: PB9
    caps:
      - motor
      - servo
  - pin: PB6
    caps:
      - motor
      - servo
  - pin: PB7
    caps:
      - motor
      - servo
