name: hummingbird_200rs
manufacturer: HBRD
mcu: at32f435
brushless: true
leds:
  - invert: true
    pin: PA8
serial_ports:
  - index: 1
    rx: PB7
    tx: PA15
  - index: 2
    rx: PB0
  - index: 5
    rx: PB5
    tx: PB6
  - index: 7
    rx: PB3
    tx: PB4
spi_ports:
  - index: 1
    miso: PA6
    mosi: PA7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB10
  - index: 4
    miso: PB8
    mosi: PB9
    sck: PB13
i2c_ports:
  - index: 2
    scl: PH2
    sda: PH3
gyro:
  port: 1
  nss: PA4
  exti: PB11
gyro_orientation: 0
osd:
  port: 4
  nss: PC14
flash:
  port: 2
  nss: PC15
vbat: PA2
vbat_scale: 110
ibat: PA3
ibat_scale: 307
rgb_led: PB1
motor_pins:
  - PA1
  - PA0
  - PA10
  - PA9
baro:
  port: 2
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 42
    tag: TIMER1_CH1
  RGB:
    dma: DMA1_STREAM2
    request: 64
    tag: TIMER3_CH4
  SPI1_RX:
    dma: DMA1_STREAM3
    request: 10
    tag: SPI1_MISO
  SPI1_TX:
    dma: DMA1_STREAM4
    request: 11
    tag: SPI1_MOSI
  SPI2_RX:
    dma: DMA1_STREAM5
    request: 12
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM6
    request: 13
    tag: SPI2_MOSI
  SPI4_RX:
    dma: DMA1_STREAM7
    request: 106
    tag: SPI4_MISO
  SPI4_TX:
    dma: DMA2_STREAM1
    request: 107
    tag: SPI4_MOSI
vehicles:
  - multi
outputs:
  - pin: PA1
    caps:
      - motor
      - servo
  - pin: PA0
    caps:
      - motor
      - servo
  - pin: PA10
    caps:
      - motor
      - servo
  - pin: PA9
    caps:
      - motor
      - servo
