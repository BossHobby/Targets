name: jhef435pro
manufacturer: JHEF
mcu: at32f435
brushless: true
leds:
  - invert: true
    pin: PB7
serial_ports:
  - index: 1
    rx: PA10
    tx: PA9
  - index: 4
    rx: PH2
    tx: PH3
  - index: 5
    rx: PB8
    tx: PB9
spi_ports:
  - index: 1
    miso: PA6
    mosi: PA7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB13
  - index: 3
    miso: PB4
    mosi: PB5
    sck: PB3
i2c_ports:
  - index: 2
    scl: PB10
    sda: PB11
gyro:
  port: 1
  nss: PA4
  exti: PC14
gyro_orientation: 4
osd:
  port: 2
  nss: PB12
flash:
  port: 3
  nss: PA15
vbat: PB0
ibat: PB1
rgb_led: PB6
buzzer:
  invert: true
  pin: PC15
motor_pins:
  - PA3
  - PA2
  - PA0
  - PA1
baro:
  port: 2
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 42
    tag: TIMER1_CH1
  RGB:
    dma: DMA1_STREAM2
    request: 67
    tag: TIMER4_CH1
  SPI1_RX:
    dma: DMA1_STREAM3
    request: 10
    tag: SPI1_MISO
  SPI1_TX:
    dma: DMA1_STREAM4
    request: 11
    tag: SPI1_MOSI
  SPI2_RX:
    dma: DMA1_STREAM5
    request: 12
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM6
    request: 13
    tag: SPI2_MOSI
  SPI3_RX:
    dma: DMA1_STREAM7
    request: 14
    tag: SPI3_MISO
  SPI3_TX:
    dma: DMA2_STREAM1
    request: 15
    tag: SPI3_MOSI
vehicles:
  - multi
outputs:
  - pin: PA3
    caps:
      - motor
      - servo
  - pin: PA2
    caps:
      - motor
      - servo
  - pin: PA0
    caps:
      - motor
      - servo
  - pin: PA1
    caps:
      - motor
      - servo
