name: geprc_taker_h743mini
manufacturer: GEPR
mcu: stm32h743
brushless: true
leds:
  - invert: true
    pin: PB7
serial_ports:
  - index: 1
    rx: PA10
    tx: PA9
  - index: 2
    rx: PD6
    tx: PD5
  - index: 3
    rx: PD9
    tx: PD8
  - index: 4
    rx: PA1
    tx: PA0
  - index: 5
    rx: PB5
  - index: 7
    rx: PE7
    tx: PE8
  - index: 8
    rx: PE0
    tx: PE1
spi_ports:
  - index: 2
    miso: PC2
    mosi: PC3
    sck: PB13
  - index: 3
    miso: PC11
    mosi: PC12
    sck: PC10
  - index: 4
    miso: PE5
    mosi: PE6
    sck: PE2
i2c_ports:
  - index: 1
    scl: PB8
    sda: PB9
  - index: 2
    scl: PB10
    sda: PB11
gyro:
  port: 2
  nss: PB12
  exti: PB2
gyro_orientation: 0
osd:
  port: 4
  nss: PE4
flash:
  port: 3
  nss: PA15
vbat: PC1
ibat: PC0
ibat_scale: 100
rgb_led: PD12
buzzer:
  invert: true
  pin: PD2
motor_pins:
  - PC8
  - PC9
  - PC6
  - PC7
baro:
  port: 1
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 11
    tag: TIMER1_CH1
  RGB:
    dma: DMA1_STREAM2
    request: 29
    tag: TIMER4_CH1
  SPI2_RX:
    dma: DMA1_STREAM3
    request: 39
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM4
    request: 40
    tag: SPI2_MOSI
  SPI3_RX:
    dma: DMA1_STREAM5
    request: 61
    tag: SPI3_MISO
  SPI3_TX:
    dma: DMA1_STREAM6
    request: 62
    tag: SPI3_MOSI
  SPI4_RX:
    dma: DMA1_STREAM7
    request: 83
    tag: SPI4_MISO
  SPI4_TX:
    dma: DMA1_STREAM8
    request: 84
    tag: SPI4_MOSI
vehicles:
  - multi
outputs:
  - pin: PC8
    caps:
      - motor
      - servo
  - pin: PC9
    caps:
      - motor
      - servo
  - pin: PC6
    caps:
      - motor
      - servo
  - pin: PC7
    caps:
      - motor
      - servo
