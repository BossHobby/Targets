name: axisflyingf745aio
manufacturer: AXFL
mcu: stm32f745
brushless: true
leds:
  - invert: true
    pin: PD15
serial_ports:
  - index: 1
    rx: PA10
    tx: PA9
  - index: 2
    rx: PA3
    tx: PA2
  - index: 3
    rx: PB11
    tx: PB10
  - index: 4
    rx: PA1
    tx: PA0
  - index: 5
    rx: PD2
    tx: PC12
  - index: 6
    rx: PC7
    tx: PC6
  - index: 7
    rx: PE7
    tx: PE8
  - index: 8
    rx: PE0
    tx: PE1
spi_ports:
  - index: 1
    miso: PA6
    mosi: PA7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB13
  - index: 3
    miso: PC11
    mosi: PD6
    sck: PC10
  - index: 4
    miso: PE5
    mosi: PE6
    sck: PE2
i2c_ports:
  - index: 1
    scl: PB8
    sda: PB9
  - index: 4
    scl: PD12
    sda: PD13
gyro:
  port: 1
  nss: PA4
  exti: PD0
gyro_orientation: 0
osd:
  port: 4
  nss: PE4
flash:
  port: 3
  nss: PA15
vbat: PC3
ibat: PC2
rgb_led: PC9
buzzer:
  invert: true
  pin: PD3
motor_pins:
  - PB4
  - PB0
  - PB5
  - PB1
baro:
  port: 4
dma:
  DSHOT_CH1:
    channel: 0
    dma: DMA2_STREAM6
    tag: TIMER1_CH1
  RGB:
    channel: 5
    dma: DMA1_STREAM2
    tag: TIMER3_CH4
  SPI1_RX:
    channel: 3
    dma: DMA2_STREAM0
    tag: SPI1_MISO
  SPI1_TX:
    channel: 3
    dma: DMA2_STREAM5
    tag: SPI1_MOSI
  SPI2_RX:
    channel: 9
    dma: DMA1_STREAM1
    tag: SPI2_MISO
  SPI2_TX:
    channel: 0
    dma: DMA1_STREAM4
    tag: SPI2_MOSI
  SPI3_RX:
    channel: 0
    dma: DMA1_STREAM0
    tag: SPI3_MISO
  SPI3_TX:
    channel: 0
    dma: DMA1_STREAM5
    tag: SPI3_MOSI
  SPI4_RX:
    channel: 5
    dma: DMA2_STREAM3
    tag: SPI4_MISO
  SPI4_TX:
    channel: 5
    dma: DMA2_STREAM4
    tag: SPI4_MOSI
vehicles:
  - multi
outputs:
  - pin: PB4
    caps:
      - motor
      - servo
  - pin: PB0
    caps:
      - motor
      - servo
  - pin: PB5
    caps:
      - motor
      - servo
  - pin: PB1
    caps:
      - motor
      - servo
