name: geprc_taker_g473aio
manufacturer: GEPR
mcu: stm32g473
brushless: true
leds:
  - invert: true
    pin: PA10
  - invert: true
    pin: PB9
serial_ports:
  - index: 1
    rx: PB7
    tx: PB6
  - index: 2
    rx: PB4
    tx: PB3
  - index: 3
    rx: PB11
    tx: PB10
spi_ports:
  - index: 1
    miso: PA6
    mosi: PA7
    sck: PA5
  - index: 2
    miso: PB14
    mosi: PB15
    sck: PB13
  - index: 3
    miso: PC11
    mosi: PB5
    sck: PC10
i2c_ports:
  - index: 2
    scl: PA9
    sda: PA8
gyro:
  port: 1
  nss: PC13
  exti: PC4
gyro_orientation: 8
osd:
  port: 2
  nss: PB12
flash:
  port: 3
  nss: PC6
vbat: PB1
ibat: PB0
ibat_scale: 750
rgb_led: PB2
buzzer:
  invert: true
  pin: PA15
motor_pins:
  - PA2
  - PA3
  - PA0
  - PA1
baro:
  port: 2
dma:
  DSHOT_CH1:
    dma: DMA1_STREAM1
    request: 42
    tag: TIMER1_CH1
  RGB:
    dma: DMA1_STREAM2
    request: 72
    tag: TIMER5_CH1
  SPI1_RX:
    dma: DMA1_STREAM3
    request: 10
    tag: SPI1_MISO
  SPI1_TX:
    dma: DMA1_STREAM4
    request: 11
    tag: SPI1_MOSI
  SPI2_RX:
    dma: DMA1_STREAM5
    request: 12
    tag: SPI2_MISO
  SPI2_TX:
    dma: DMA1_STREAM6
    request: 13
    tag: SPI2_MOSI
  SPI3_RX:
    dma: DMA1_STREAM7
    request: 14
    tag: SPI3_MISO
  SPI3_TX:
    dma: DMA1_STREAM8
    request: 15
    tag: SPI3_MOSI
vehicles:
  - multi
outputs:
  - pin: PA2
    caps:
      - motor
      - servo
  - pin: PA3
    caps:
      - motor
      - servo
  - pin: PA0
    caps:
      - motor
      - servo
  - pin: PA1
    caps:
      - motor
      - servo
